name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install / update dependencies
        run: |
          cd /opt/oxypc
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Copy updated files
        run: |
          rsync -a --exclude='.git' --exclude='venv' --exclude='.env' \
                --exclude='*.pyc' --exclude='__pycache__' \
                $GITHUB_WORKSPACE/ /opt/oxypc/

      - name: Run database migrations
        run: |
          cd /opt/oxypc
          source venv/bin/activate
          alembic upgrade head

      - name: Restart app
        run: systemctl restart oxypc

      - name: Health check
        run: |
          sleep 3
          curl -sf http://127.0.0.1:8000/health || curl -sf http://127.0.0.1:8000/ || echo "App started"
